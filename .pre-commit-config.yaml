repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python3 tests/test_server.py
        language: system
        pass_filenames: false
        files: \.(py|json)$
